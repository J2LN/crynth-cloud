<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Crynth Cloud</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="assets/icon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
  <div class="content">

    <img src="assets/icon.png" class="logo">

    <h1>Crynth Cloud</h1>
    <p>Tout contenu présent dans le cloud est un regroupement de différentes ressources.</p>

    <!-- 🔥 BOUTONS -->
    <div class="btn-group">
      <button class="download-btn">Télécharger</button>

      <button class="discord-btn" onclick="window.open('https://discord.gg/327x7rsyGn', '_blank')">
        <svg viewBox="0 0 71 55" width="18" height="18">
          <path fill="currentColor" d="M60.1 4.9A58.5 58.5 0 0045.5.5a40 40 0 00-1.8 3.7 54.2 54.2 0 00-16.4 0A40 40 0 0025.5.5 58.4 58.4 0 0010.9 5 62 62 0 00.2 45.3a58.7 58.7 0 0017.9 9 44.3 44.3 0 003.8-6.2 38.3 38.3 0 01-6-2.9l1.5-1.1a41.9 41.9 0 0035.6 0l1.5 1.1a38.3 38.3 0 01-6 2.9 44.3 44.3 0 003.8 6.2 58.6 58.6 0 0017.9-9A61.9 61.9 0 0060.1 4.9z"/>
        </svg>
        Discord
      </button>
    </div>

    <span class="windows">Disponible uniquement sur Windows</span>

  </div>
</section>

<section class="screens">
  <div class="slider">

    <div class="slides">
      <img src="assets/screen1.png">
      <img src="assets/screen2.png">
      <img src="assets/screen3.png">
    </div>
  </div>

  <div class="controls">
    <button id="prev">‹</button>
    <button id="next">›</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
